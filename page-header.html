<!-- Paste at the top of .page-content — requires page-header.css + tokens.css -->

<header class="op-page-header">

  <!-- Page title — replace with screen-specific title -->
  <h1 class="op-page-header-title">Task Management</h1>

  <!-- Action buttons — right-aligned -->
  <div class="op-page-header-actions">

    <!-- Settings / gear -->
    <button class="op-page-header-icon-btn" title="Settings">
      <i class="fa-solid fa-gear"></i>
    </button>

    <!-- Primary action — "New Task" button -->
    <!-- Use .btn-primary from tokens for the filled button style -->
    <button class="btn btn-primary btn-sm">
      <i class="fa-solid fa-plus"></i>
      New Task
    </button>

  </div>
</header>
