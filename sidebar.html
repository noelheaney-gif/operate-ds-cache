<!-- Paste inside <body> — requires sidebar.css + tokens.css -->

<aside class="sidebar" id="sidebar">

    <!-- Time -->

    <!-- Calendar -->

    <!-- Documents -->
    <div class="sidebar-item" data-route="documents">
      <i class="fa-solid fa-file-lines"></i>

    <!-- Reports -->
    <div class="sidebar-item" data-route="reports">

      <span class="tooltip">Reports</span>

  <!-- Footer — fixed order: Help → User → Collapse -->
  <div class="sidebar-footer">

    <!-- Help -->
    <a href="#" class="sf-item">
      <span class="sf-icon-wrap"><i class="fa-solid fa-circle-question"></i></span>
      <span class="sf-text">Help</span>
      <span class="tooltip">Help</span>
    </a>

    <!-- User — ALWAYS Emily Carl -->
    <div class="sf-item" id="sf-user-btn">
      <div class="sf-avatar-img">
        <!-- Inline SVG avatar — EC initials, no external image required -->
        <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="12" fill="#6366f1"/>
          <text x="12" y="16" text-anchor="middle" font-family="Inter,sans-serif"
                font-size="9" font-weight="600" fill="#fff">EC</text>
        </svg>
        <span class="sf-avatar-status"></span>
      </div>
      <span class="sf-text">Emily Carl</span>
      <span class="tooltip">Emily Carl</span>
    </div>

    <!-- Collapse toggle -->
    <div class="sf-item" id="sidebar-collapse-btn">
      <span class="sf-icon-wrap"><i class="fa-solid fa-chevron-left" id="sidebar-collapse-icon"></i></span>
      <span class="sf-text">Collapse</span>
      <span class="tooltip">Expand</span>
    </div>

  </div>
</aside>

<!-- Sidebar collapse/expand JS — include once per prototype -->
<script>
(function() {
  var btn = document.getElementById('sidebar-collapse-btn');
  var sidebar = document.getElementById('sidebar');
  var icon = document.getElementById('sidebar-collapse-icon');
  var shell = document.querySelector('.app-shell');
  if (!btn || !sidebar) return;
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var collapsed = sidebar.classList.toggle('collapsed');
    if (shell) shell.classList.toggle('sidebar-collapsed', collapsed);
    icon.className = collapsed
      ? 'fa-solid fa-chevron-right'
      : 'fa-solid fa-chevron-left';
  });
})();
</script>
